<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      letter-spacing: 2px;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.8rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }
    
    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x {
      color: #e94560;
    }

    .cell.o {
      color: #a8dadc;
    }

    .cell.win {
      background: #0f3460;
      box-shadow: 0 0 12px rgba(168, 218, 220, 0.5);
    }

    #controls {
      margin-top: 2rem;
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    button {
      padding: 0.6rem 1.4rem;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      background: #e94560;
      color: #fff;
      transition: background 0.15s, transform 0.1s;
    }

    button:hover {
      background: #c73652;
      transform: scale(1.04);
    }

    #mode-toggle {
      background: #0f3460;
    }

    #mode-toggle:hover {
      background: #1a4a80;
    }

    #score {
      display: flex;
      gap: 2rem;
      margin-top: 1.5rem;
      font-size: 1rem;
      color: #888;
    }

    #score span {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
    }

    #score strong {
      font-size: 1.4rem;
    }

    .x-score strong { color: #e94560; }
    .o-score strong { color: #a8dadc; }
    .tie-score strong { color: #aaa; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="status">X's turn</div>
  <div id="board"></div>
  <div id="controls">
    <button id="restart">Restart</button>
    <button id="mode-toggle">vs Computer</button>
  </div>
  <div id="score">
    <span class="x-score">X <strong id="x-wins">0</strong></span>
    <span class="tie-score">Ties <strong id="ties">0</strong></span>
    <span class="o-score">O <strong id="o-wins">0</strong></span>
  </div>

  <script>
    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const restartBtn = document.getElementById('restart');
    const modeBtn = document.getElementById('mode-toggle');
    const xWinsEl = document.getElementById('x-wins');
    const oWinsEl = document.getElementById('o-wins');
    const tiesEl = document.getElementById('ties');

    const WIN_LINES = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, gameOver, vsComputer;
    let score = { X: 0, O: 0, tie: 0 };

    function init() {
      board = Array(9).fill('');
      current = 'X';
      gameOver = false;
      renderBoard();
      statusEl.textContent = "X's turn";
    }

    function renderBoard() {
      boardEl.innerHTML = '';
      board.forEach((val, i) => {
        const cell = document.createElement('div');
        cell.className = 'cell' + (val ? ' taken ' + val.toLowerCase() : '');
        cell.textContent = val;
        cell.addEventListener('click', () => handleClick(i));
        boardEl.appendChild(cell);
      });
    }

    function highlight(line) {
      const cells = boardEl.querySelectorAll('.cell');
      line.forEach(i => cells[i].classList.add('win'));
    }

    function checkWinner(b) {
      for (const line of WIN_LINES) {
        const [a, bl, c] = line;
        if (b[a] && b[a] === b[bl] && b[a] === b[c]) return { winner: b[a], line };
      }
      if (b.every(v => v)) return { winner: 'tie' };
      return null;
    }

    function handleClick(i) {
      if (gameOver || board[i]) return;
      if (vsComputer && current === 'O') return;
      makeMove(i);
    }

    function makeMove(i) {
      board[i] = current;
      renderBoard();
      const result = checkWinner(board);
      if (result) {
        endGame(result);
        return;
      }
      current = current === 'X' ? 'O' : 'X';
      statusEl.textContent = current + "'s turn";
      if (vsComputer && current === 'O' && !gameOver) {
        setTimeout(computerMove, 350);
      }
    }

    function endGame(result) {
      gameOver = true;
      if (result.winner === 'tie') {
        statusEl.textContent = "It's a tie!";
        score.tie++;
        tiesEl.textContent = score.tie;
      } else {
        statusEl.textContent = result.winner + ' wins!';
        highlight(result.line);
        score[result.winner]++;
        xWinsEl.textContent = score.X;
        oWinsEl.textContent = score.O;
      }
    }

    // Minimax AI
    function computerMove() {
      const best = minimax(board, 'O');
      makeMove(best.index);
    }

    function minimax(b, player) {
      const result = checkWinner(b);
      if (result) {
        if (result.winner === 'O') return { score: 10 };
        if (result.winner === 'X') return { score: -10 };
        return { score: 0 };
      }

      const moves = [];
      b.forEach((v, i) => {
        if (!v) {
          const newBoard = [...b];
          newBoard[i] = player;
          const res = minimax(newBoard, player === 'O' ? 'X' : 'O');
          moves.push({ index: i, score: res.score });
        }
      });

      if (player === 'O') {
        return moves.reduce((best, m) => m.score > best.score ? m : best, { score: -Infinity });
      } else {
        return moves.reduce((best, m) => m.score < best.score ? m : best, { score: Infinity });
      }
    }

    restartBtn.addEventListener('click', init);

    modeBtn.addEventListener('click', () => {
      vsComputer = !vsComputer;
      modeBtn.textContent = vsComputer ? 'vs Human' : 'vs Computer';
      score = { X: 0, O: 0, tie: 0 };
      xWinsEl.textContent = 0;
      oWinsEl.textContent = 0;
      tiesEl.textContent = 0;
      init();
    });

    vsComputer = false;
    init();
  </script>
</body>
</html>
